<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Metall mit IBL</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #100d14; font-family: system-ui, sans-serif; }
    #canvas { width: 100%; height: 100%; touch-action: none; display: block; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script>
  (function () {
    const canvas = document.getElementById("canvas");
    if (!canvas || typeof BABYLON === "undefined") return;
    const engine = new BABYLON.Engine(canvas, true);
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0.06, 0.06, 0.08, 1);

    const camera = new BABYLON.ArcRotateCamera("cam", -Math.PI / 2, Math.PI / 2.35, 3.5, BABYLON.Vector3.Zero(), scene);
    camera.attachControl(canvas, true);
    camera.lowerRadiusLimit = camera.upperRadiusLimit = 3.5;

    new BABYLON.PointLight("key", new BABYLON.Vector3(-2.5, 3, -2), scene).intensity = 5.0;
    new BABYLON.PointLight("fill", new BABYLON.Vector3(3, 1.5, 2.5), scene).intensity = 1.2;
    new BABYLON.PointLight("rim", new BABYLON.Vector3(0, -1, 4), scene).intensity = 0.8;

    const envUrl = "https://playground.babylonjs.com/textures/environment.env";
    scene.environmentTexture = BABYLON.CubeTexture.CreateFromPrefilteredData(envUrl, scene);

    const mat = new BABYLON.PBRMetallicRoughnessMaterial("mat", scene);
    mat.baseColor = new BABYLON.Color3(1.0, 0.78, 0.34);
    mat.metallic = 1.0;
    mat.roughness = 0.15;
    mat.environmentIntensity = 1.0;

    const sphere = BABYLON.MeshBuilder.CreateSphere("sphere", { diameter: 1.8, segments: 48 }, scene);
    sphere.material = mat;

    let t = 0;
    engine.runRenderLoop(() => {
      t += 0.004;
      camera.alpha = -Math.PI / 2 + Math.sin(t) * 0.3;
      scene.render();
    });
    window.addEventListener("resize", () => engine.resize());
  })();
  </script>
</body>
</html>
