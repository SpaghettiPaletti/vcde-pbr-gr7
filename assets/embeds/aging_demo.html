<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buckler Alterung</title>
  <style>
    html, body {
      margin: 0;
      padding: 4px 6px;
      height: 100%;
      box-sizing: border-box;
      background: #f8f9fa;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    #agingDemoGrid {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }
    .agingMainRow {
      flex: 1;
      display: flex;
      gap: 10px;
      min-height: 0;
    }
    .agingLeft {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .agingRight {
      width: 214px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-height: 0;
    }
    .agingControlGrid {
      display: grid;
      grid-template-columns: 1.1fr 1fr 1fr;
      gap: 8px;
      align-items: start;
      font-size: 0.76em;
      flex-shrink: 0;
    }
    .agingControlStack { display: flex; flex-direction: column; gap: 5px; }
    .agingButtonRow { display: flex; flex-wrap: wrap; gap: 4px; }
    .agingMapBtn, .agingPresetBtn {
      padding: 3px 6px; border: 1px solid #888; border-radius: 4px; cursor: pointer; font-size: 0.88em;
    }
    .agingMapBtn { background: #212529; color: #fff; }
    .agingPresetBtn { background: #fff; color: #212529; }
    .agingCanvasWrap {
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    #agingCanvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 6px;
      background: #111;
      touch-action: none;
    }
    #agingModeTitle, #agingModeText { font-size: 0.74em; color: #555; }
    .agingStatusLine { flex-shrink: 0; line-height: 1.15; }
    .agingMapPreviewSection {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-height: 0;
    }
    .agingMapPreviewSelect {
      width: 100%;
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid #bbb;
      background: #fff;
      font-size: 0.8em;
      flex-shrink: 0;
    }
    .agingPreviewColumn {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 3px;
      min-height: 0;
    }
    .agingPreviewRow {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-height: 0;
    }
    .agingPreviewLabel {
      width: 68px;
      font-size: 0.68em;
      font-weight: 600;
      line-height: 1.1;
      flex-shrink: 0;
    }
    .agingPreviewCanvas {
      display: block;
      height: 100%;
      max-height: 100px;
      width: auto;
      aspect-ratio: 1;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #222;
      flex-shrink: 0;
    }
    #zoomSlider, label[for="zoomSlider"], #zoomValue { display: none !important; }
    select#agingEnvSwitch { width: 100%; padding: 3px; font-size: 0.9em; }
    .agingRightTitle {
      font-weight: 600;
      font-size: 0.8em;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="agingDemoGrid">
    <div class="agingMainRow">
      <div class="agingLeft">
        <div class="agingControlGrid">
          <div class="agingControlStack">
            <div>
              <label for="agingEnvSwitch" style="font-weight:600;">Umgebung</label>
              <select id="agingEnvSwitch">
                <option value="https://playground.babylonjs.com/textures/environment.env">Stadt (neutral)</option>
                <option value="https://playground.babylonjs.com/textures/country.env">Landlandschaft</option>
                <option value="https://playground.babylonjs.com/textures/forest.env">Wald</option>
                <option value="https://playground.babylonjs.com/textures/night.env">Nacht</option>
                <option value="https://playground.babylonjs.com/textures/room.env">Innenraum</option>
              </select>
            </div>
            <div>
              <div style="font-weight:600; margin-bottom:2px;">Presets</div>
              <div class="agingButtonRow">
                <button class="agingPresetBtn" data-age="0">Neu</button>
                <button class="agingPresetBtn" data-age="76">Gealtert</button>
                <button class="agingPresetBtn" data-age="100">Rost</button>
              </div>
            </div>
          </div>
          <div class="agingControlStack">
            <label for="agingSlider" style="display:flex; justify-content:space-between; font-weight:600;">
              <span>Alterung</span><span id="agingValue">0%</span>
            </label>
            <input id="agingSlider" type="range" min="0" max="100" step="1" value="0" style="width:100%;">
            <label for="zoomSlider" style="display:flex; justify-content:space-between; font-weight:600;">
              <span>Zoom</span><span id="zoomValue">3.35</span>
            </label>
            <input id="zoomSlider" type="range" min="2.45" max="4.80" step="0.01" value="3.35" style="width:100%;">
          </div>
          <div class="agingControlStack">
            <div style="font-weight:600; margin-bottom:2px;">Aktive Maps</div>
            <div class="agingButtonRow">
              <button class="agingMapBtn" data-map="albedo">Base Color</button>
              <button class="agingMapBtn" data-map="roughness">Roughness</button>
              <button class="agingMapBtn" data-map="metallic">Metallic</button>
              <button class="agingMapBtn" data-map="normal">Normal</button>
              <button class="agingMapBtn" data-map="ao">AO/Cavity</button>
            </div>
          </div>
        </div>
        <div class="agingCanvasWrap"><canvas id="agingCanvas"></canvas></div>
        <div class="agingStatusLine"><strong id="agingModeTitle">Aktiv:</strong> <span id="agingModeText">Alle Maps aktiv.</span></div>
      </div>
      <div class="agingRight">
        <div class="agingMapPreviewSection">
          <label for="mapPreviewMaterial" class="agingRightTitle">2D-Map-Vorschau</label>
          <select id="mapPreviewMaterial" class="agingMapPreviewSelect">
            <option value="body">Stahlschildfläche</option>
            <option value="boss">Messingbuckel</option>
            <option value="rim">Gold-Randeinlage</option>
            <option value="rivet">Stahlzierniete</option>
            <option value="leather">Leder (Rückseite)</option>
            <option value="back">Rückseite (Metall)</option>
          </select>
          <div class="agingPreviewColumn">
            <div class="agingPreviewRow">
              <div class="agingPreviewLabel">Albedo</div>
              <canvas id="albedoPreview" width="128" height="128" class="agingPreviewCanvas"></canvas>
            </div>
            <div class="agingPreviewRow">
              <div class="agingPreviewLabel">Metallic</div>
              <canvas id="metallicPreview" width="128" height="128" class="agingPreviewCanvas"></canvas>
            </div>
            <div class="agingPreviewRow">
              <div class="agingPreviewLabel">Roughness</div>
              <canvas id="roughnessPreview" width="128" height="128" class="agingPreviewCanvas"></canvas>
            </div>
            <div class="agingPreviewRow">
              <div class="agingPreviewLabel">Normal</div>
              <canvas id="normalPreview" width="128" height="128" class="agingPreviewCanvas"></canvas>
            </div>
            <div class="agingPreviewRow">
              <div class="agingPreviewLabel">AO/Cavity</div>
              <canvas id="aoPreview" width="128" height="128" class="agingPreviewCanvas"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="embed_common.js"></script>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="../glb_embedded.js"></script>
  <script src="glb_loader.js"></script>
  <script src="aging_demo.js"></script>
</body>
</html>
